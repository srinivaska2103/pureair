<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 2C8 6 4 10 4 14C4 18 8 22 12 22C16 22 20 18 20 14C20 10 16 6 12 2Z' fill='%233b82f6' fill-opacity='0.1'%3E%3C/path%3E%3Cpath d='M9 10L15 10' stroke='%232563eb'%3E%3C/path%3E%3Cpath d='M8 14L16 14' stroke='%232563eb'%3E%3C/path%3E%3Cpath d='M9 18L15 18' stroke='%232563eb'%3E%3C/path%3E%3C/svg%3E">
    <title>Login | Pure Air</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        function applySettings() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else { document.documentElement.classList.remove('dark'); }
            document.documentElement.dir = localStorage.dir || 'ltr';
        }
        applySettings();
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white transition-colors duration-300 font-sans">

    <!-- Navbar: Matches Home Page Style -->
  <nav class="flex items-center justify-end p-6">
    <!-- Modern Toggles: Aligned to the Right -->
    <div class="flex gap-2">
        <!-- Direction Toggle -->
        <button onclick="toggleDir()" class="w-9 h-9 flex items-center justify-center rounded-full border bg-white dark:bg-slate-800 text-[10px] font-bold">
           LTR
        </button>

        <!-- Theme Toggle -->
        <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-full border bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
             <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>

        </button>
    </div>
</nav>

    <!-- Login Form -->
    <main class="flex items-center justify-center p-6 mt-6">
    <div class="w-full max-w-md bg-white dark:bg-slate-900 p-8 rounded-[2rem] border border-slate-100 dark:border-slate-800 shadow-2xl transition-all">
        
        <div class="flex justify-center mb-6">
            <a href="index.html" class="flex items-center gap-2 text-2xl font-bold text-blue-600">
                <svg class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2C8 6 4 10 4 14C4 18 8 22 12 22C16 22 20 18 20 14C20 10 16 6 12 2Z" class="text-blue-500" fill="currentColor" fill-opacity="0.1"></path>
                    <path d="M9 10L15 10" class="text-blue-600"></path>
                    <path d="M8 14L16 14" class="text-blue-600"></path>
                    <path d="M9 18L15 18" class="text-blue-600"></path>
                </svg>
                 <span>PureAir</span>
            </a>
        </div>

        <div class="text-center mb-8">
            <h2 class="text-2xl font-semibold mb-2">Welcome Back</h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm">
                Sign in to manage your HVAC services.
            </p>
        </div> 
        
        <form class="space-y-4" onsubmit="event.preventDefault()">
            <input type="email" placeholder="Email address" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 border-none outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            
            <div class="relative">
                <input type="password" id="pass" placeholder="Password" 
                       class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 border-none outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                
                <button type="button" onclick="togglePass()" 
                        class="absolute top-4 end-4 text-slate-400 hover:text-blue-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                </button>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" class="accent-blue-600"> Remember me</label>
                <a href="#" class="text-blue-600 font-medium hover:underline">Forgot password?</a>
            </div>

            <button class="w-full py-4 bg-blue-600 text-white rounded-xl font-semibold hover:bg-blue-700 active:scale-[0.98] transition-all shadow-lg shadow-blue-600/20">Login</button>
        </form>

       <div class="mt-8 text-center text-sm">
                <p class="text-slate-500">Or sign up with</p>
                <div class="flex justify-center gap-4 mt-4">
                    <!-- Social Icons -->
                    <button class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl hover:bg-blue-50 dark:hover:bg-slate-700 transition"><svg class="w-6 h-6" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.5 1.2 9 3.2l6.8-6.8C35.5 2.6 30.3 0 24 0 14.8 0 7 5.5 3.3 13.3l7.8 6.1C13 14.2 18 9.5 24 9.5z"/><path fill="#4285F4" d="M46.7 24.5c0-1.5-.1-3-0.5-4.5H24v9h12.7c-0.6 3.2-2.4 5.9-5.1 7.7l7.8 6.1c4.6-4.3 7.3-10.7 7.3-18.3z"/><path fill="#FBBC05" d="M11.1 28.5c-0.7-2.1-1.1-4.4-1.1-6.5s0.4-4.4 1.1-6.5l-7.8-6.1C0.8 14.4 0 18.1 0 22s0.8 7.6 2.3 11.2l7.8-6.1z"/><path fill="#34A853" d="M24 48c6.5 0 12-2.2 16-5.8l-7.8-6.1c-2.2 1.5-5 2.4-8.2 2.4-6 0-11-4.1-12.8-9.6l-7.8 6.1C12.9 42.5 17.8 48 24 48z"/></svg></button>
                    <button class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl hover:bg-blue-50 dark:hover:bg-slate-700 transition"><svg class="w-6 h-6" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874V12h3.328l-.532 3.469h-2.796v8.385C19.61 22.954 23.998 17.99 23.998 12z"/></svg></button>
                    <button class="p-3 bg-slate-50 dark:bg-slate-800 rounded-xl hover:bg-slate-200 transition"><svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.5C2.36 16.64 2.12 10.45 5.71 8.28c1.33-.82 2.76-1.2 4.22-1.23 1.34-.03 2.62.46 3.48.46 1.05 0 2.48-.73 4.18-.73 2.19 0 3.52 1.1 4.1 2.37-3.9 1.88-3.4 5.86-1.5 7.15zM12.98 5.76c.72-.85 1.21-2.03 1.08-3.21-1.12.05-2.48.74-3.27 1.66-.67.75-1.25 1.95-1.09 3.12 1.26.1 2.56-.58 3.28-1.57z"/></svg></button>
                </div>
                <p class="mt-8 text-slate-500">Already have an account? <a href="signup.html" class="text-blue-600 font-semibold hover:underline">Login</a></p>
            </div>
    </div>
</main>

    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        }
        function toggleDir() {
            const dir = document.documentElement.dir === 'rtl' ? 'ltr' : 'rtl';
            document.documentElement.dir = dir;
            localStorage.dir = dir;
        }
        function togglePass() {
            const p = document.getElementById('pass');
            p.type = p.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
